spring:
  application:
    name: banking-agent-worker-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/banking_agent}
    username: ${SPRING_DATASOURCE_USERNAME:app}
    password: ${SPRING_DATASOURCE_PASSWORD:app}
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:banking-agent-job-consumer}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

server:
  port: ${SERVER_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

app:
  legacy:
    base-url: ${APP_LEGACY_BASE_URL:http://localhost:8081}
  kafka:
    enabled: ${APP_KAFKA_ENABLED:true}
    consumer:
      enabled: ${APP_KAFKA_CONSUMER_ENABLED:true}
      group-id: ${KAFKA_CONSUMER_GROUP_ID:banking-agent-job-consumer}
      max-attempts: ${APP_KAFKA_CONSUMER_MAX_ATTEMPTS:3}
    topics:
      jobRequested: agent.job.requested
